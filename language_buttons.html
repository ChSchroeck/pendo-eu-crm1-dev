<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buttons</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
    }

    button {
      margin-right: 10px;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <button id="btn-download"></button>
  <button id="btn-upload"></button>
  <button id="btn-new"></button>

  <script>
    const translations = {
      de: { download: 'Herunterladen', upload: 'Hochladen', new: 'Neu' },
      fr: { download: 'Télécharger',  upload: 'Envoyer',    new: 'Nouveau' },
      en: { download: 'Download',     upload: 'Upload',      new: 'New' }
    };

    const lang = (navigator.language || 'en').substring(0, 2).toLowerCase();
    const t = translations[lang] || translations['en'];

    document.getElementById('btn-download').textContent = t.download;
    document.getElementById('btn-upload').textContent   = t.upload;
    document.getElementById('btn-new').textContent      = t.new;
  </script>

</body>
</html>
