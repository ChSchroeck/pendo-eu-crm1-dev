<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      font-family: 'Courier New', monospace;
      border-bottom: 1px solid #2a2a2a;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: #e8ff47;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }

    .logo-text {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f0f0f0;
    }

    .logo-text span { color: #e8ff47; }

    nav {
      display: flex;
      gap: 28px;
    }

    nav a {
      color: #888;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover, nav a.active { color: #e8ff47; }

    .status {
      font-size: 11px;
      color: #444;
      letter-spacing: 0.08em;
    }

    .status span {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4cff91;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-mark"></div>
    <div class="logo-text">Frame<span>OS</span></div>
  </div>

  <nav>
    <a href="#" class="active">Dashboard</a>
    <a href="#">Projects</a>
    <a href="#">Settings</a>
    <a href="#">Docs</a>
  </nav>

  <div class="status"><span></span>System online</div>
</body>
</html>
