<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      background: #111;
      font-family: 'Courier New', monospace;
      padding: 20px 0;
      overflow-y: auto;
      border-right: 1px solid #1e1e1e;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #3a3a3a;
      padding: 0 18px 8px;
      margin-top: 20px;
    }

    .section-label:first-child { margin-top: 0; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .nav-item:hover { background: #181818; }

    .nav-item.active {
      background: #161616;
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #e8ff47;
    }

    .nav-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .nav-item.active .nav-icon { opacity: 1; }

    .nav-label {
      font-size: 12px;
      color: #555;
      letter-spacing: 0.06em;
    }

    .nav-item.active .nav-label { color: #e0e0e0; }

    .badge {
      margin-left: auto;
      font-size: 9px;
      background: #222;
      color: #666;
      border-radius: 3px;
      padding: 1px 5px;
      letter-spacing: 0.04em;
    }

    .nav-item.active .badge {
      background: #e8ff4720;
      color: #e8ff47;
    }

    hr {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 12px 0;
    }
  </style>
</head>
<body>

  <div class="section-label">Workspace</div>

  <div class="nav-item active">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="6" height="6" fill="#e8ff47"/>
      <rect x="9" y="1" width="6" height="6" fill="#e8ff47"/>
      <rect x="1" y="9" width="6" height="6" fill="#e8ff47"/>
      <rect x="9" y="9" width="6" height="6" fill="#e8ff47"/>
    </svg>
    <span class="nav-label">Overview</span>
    <span class="badge">4</span>
  </div>

  <div class="nav-item">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 1L15 5V11L8 15L1 11V5L8 1Z" stroke="#888" stroke-width="1.2"/>
    </svg>
    <span class="nav-label">Modules</span>
  </div>

  <div class="nav-item">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="8" cy="8" r="6" stroke="#888" stroke-width="1.2"/>
      <path d="M8 5V8L10 10" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="nav-label">History</span>
  </div>

  <hr>
  <div class="section-label">Resources</div>

  <div class="nav-item">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 4h12M2 8h8M2 12h10" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="nav-label">Logs</span>
    <span class="badge">12</span>
  </div>

  <div class="nav-item">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="12" height="12" rx="1" stroke="#888" stroke-width="1.2"/>
      <path d="M5 8h6M8 5v6" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="nav-label">Assets</span>
  </div>

  <div class="nav-item">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="8" cy="6" r="3" stroke="#888" stroke-width="1.2"/>
      <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="nav-label">Team</span>
  </div>

  <hr>
  <div class="section-label">System</div>

  <div class="nav-item">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 2a6 6 0 1 0 0 12A6 6 0 0 0 8 2zm0 2v4l3 2" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="nav-label">Settings</span>
  </div>

</body>
</html>
